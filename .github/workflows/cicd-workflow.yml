name: CI/CD Workflow

on:
  push:
    branches: [main]
  workflow_dispatch: # Allow manual run (can be used for destroy)

jobs:
  Test_and_Build:
    name: Test and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 black isort

      - name: Check Python syntax
        run: |
          echo "🔍 Checking Python syntax..."
          find . -name "*.py" -not -path "./venv/*" | while read file; do
            echo "Checking $file..."
            python -m py_compile "$file" || exit 1
          done
          echo "✅ All Python files have valid syntax"

      - name: Lint and format checks
        run: |
          flake8 app.py --max-line-length=100 --ignore=E203,W503 || echo "⚠️ flake8 warnings"
          black --check app.py || echo "⚠️ Formatting issues"

      - name: Build Docker image
        run: |
          docker build -t crooper/ai-model:latest .
          echo "✅ Docker image built"

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker image
        run: |
          docker push crooper/ai-model:latest
          echo "✅ Docker image pushed"

Deploy_to_AWS:
  name: Deploy to AWS
  runs-on: ubuntu-latest
  needs: Test_and_Build
  if: success()

  steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.6.0

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: eu-central-1

    - name: Generate SSH Key Pair
      run: |
        ssh-keygen -t rsa -b 4096 -f ~/.ssh/id_rsa -N ""
        echo "SSH_PUBLIC_KEY<<EOF" >> $GITHUB_ENV
        cat ~/.ssh/id_rsa.pub >> $GITHUB_ENV
        echo "EOF" >> $GITHUB_ENV

    - name: Terraform Init
      working-directory: terraform/aws
      run: terraform init

    - name: Terraform Apply
      working-directory: terraform/aws
      run: |
        terraform apply \
          -var="public_key=${{ env.SSH_PUBLIC_KEY }}" \
          -var="private_key_path=~/.ssh/id_rsa" \
          -auto-approve

    - name: Get Terraform Outputs
      id: terraform-outputs
      working-directory: terraform/aws
      run: |
        echo "instance_ip=$(terraform output -raw instance_public_ip)" >> $GITHUB_OUTPUT
        echo "application_url=$(terraform output -raw application_url)" >> $GITHUB_OUTPUT
        echo "ssh_command=$(terraform output -raw ssh_command)" >> $GITHUB_OUTPUT

    - name: Copy deploy.sh
      run: scp -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa deploy.sh ubuntu@${{ steps.terraform-outputs.outputs.instance_ip }}:/tmp/deploy.sh

    - name: Run deploy.sh
      run: ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa ubuntu@${{ steps.terraform-outputs.outputs.instance_ip }} 'bash /tmp/deploy.sh'
