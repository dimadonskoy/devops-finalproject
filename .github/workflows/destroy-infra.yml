name: Destroy AWS Infrastructure

on:
    workflow_dispatch: # Manual trigger from GitHub Actions

jobs:
    Destroy_AWS:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Terraform
              uses: hashicorp/setup-terraform@v3
              with:
                  terraform_version: 1.6.0

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: eu-central-1

            - name: Terraform Init
              working-directory: terraform/aws
              run: terraform init

            - name: Import existing EC2 and key pair
              working-directory: terraform/aws
              run: |
                  echo "🔹 Importing existing resources into Terraform state..."
                  terraform import -var="public_key=$(cat ~/.ssh/id_rsa.pub)" aws_instance.app $(aws ec2 describe-instances --filters "Name=tag:Name,Values=ai-chatbot" --query "Reservations[0].Instances[0].InstanceId" --output text)
                  terraform import -var="public_key=$(cat ~/.ssh/id_rsa.pub)" aws_key_pair.app ai-chatbot-key || echo "Key pair already imported"

            - name: Terraform Destroy
              working-directory: terraform/aws
              run: |
                  echo "🔹 Destroying all AWS resources..."
                  terraform destroy -auto-approve
